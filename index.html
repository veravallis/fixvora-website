<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixvora - Coming Soon</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
}

/* Header */
.header {
    position: absolute;
    top: 15px;
    left: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.header img {
    height: 70px;
    background: transparent;
}

/* Brand */
.brand-name {
    font-size: 30px;
    font-weight: bold;
    line-height: 1;
}

.tagline {
    font-size: 14px;
    margin-top: 3px;
}

/* Colors */
.blue { color: #1a5fb4; }
.orange { color: #ff6a00; }

/* Main container */
.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* Text */
.small-text {
    letter-spacing: 3px;
    font-weight: bold;
    color: #1a2a4f;
}

h1 {
    font-size: 50px;
    margin: 10px 0;
}

p {
    font-size: 18px;
    color: #444;
    max-width: 600px;
}

/* Button */
.btn {
    margin-top: 25px;
    background: #25D366;
    color: white;
    padding: 14px 28px;
    border-radius: 40px;
    text-decoration: none;
    font-size: 17px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #1ebe5d;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 50px;
    flex-wrap: wrap;
}

.feature {
    text-align: center;
    color: #333;
}

.feature i {
    font-size: 28px;
    background: #e6ecf5;
    padding: 15px;
    border-radius: 50%;
    display: inline-block;
    margin-bottom: 10px;
}

/* Footer */
.footer {
    background: #0d2b5c;
    color: white;
    text-align: center;
    padding: 10px;
    font-size: 14px;
}

/* Responsive */
@media (max-width: 768px) {

    .header img {
        height: 50px;
    }

    .brand-name {
        font-size: 22px;
    }

    .tagline {
        font-size: 12px;
    }

    h1 {
        font-size: 32px;
    }

    p {
        font-size: 16px;
    }

    .btn {
        padding: 12px 20px;
        font-size: 16px;
    }
}
</style>

</head>

<body>

<!-- Header -->
<div class="header">

    <img src="logo.png" alt="Fixvora Logo">

    <div>
       
    </div>

</div>

<!-- Main Content -->
<div class="container">

    <div class="small-text">WE'RE</div>

    <h1>
        <span class="blue">COMING</span>
        <span class="orange"> SOON!</span>
    </h1>

    <p>
        We are working hard to bring you fast, reliable and 
        quality home services.
    </p>

    <p><strong>Stay tuned. Something great is on the way!</strong></p>

    <a href="https://wa.me/91XXXXXXXXXX" class="btn">
        📲 Contact Us on WhatsApp
    </a>

    <!-- Features -->
    <div class="features">

        <div class="feature">
            <i>🛡️</i>
            <p><strong>Trusted</strong><br>Professionals</p>
        </div>

        <div class="feature">
            <i>⏰</i>
            <p><strong>Fast & On-Time</strong><br>Service</p>
        </div>

        <div class="feature">
            <i>⭐</i>
            <p><strong>Quality</strong><br>Assured</p>
        </div>

        <div class="feature">
            <i>🎧</i>
            <p><strong>Customer</strong><br>Support</p>
        </div>

    </div>

</div>

<!-- Footer -->
<div class="footer">
    © 2025 Fixvora. All Rights Reserved.
</div>

</body>
</html>
